@startuml system_configuration_diagram

skinparam linetype ortho

actor "利用者" as user
actor "運営" as operator

card "クライアント (パソコンやスマートフォンなど)" as Client {
    package "Webブラウザ" as webbrowser {
        component "Webページ (ポートフォリオ)" as webpage
    }
}

card "サーバ (さくらVPS)" as Server {
    package "Webサーバ (Apache)" as webserver {
        component "Webサービス" as webservice
    }
    database "DBサーバ (MySQL)" {
        component "data" as dbserver 
    }
}

Client -[hidden]- Server
Client -[hidden]- operator

user -r-> webpage : アクセス

webpage - webservice : サービスの利用
dbserver -r-> webservice

dbserver <-d- operator : データの投稿

@enduml

